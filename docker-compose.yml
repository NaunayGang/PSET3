services:
  db:
    image: postgres:15
    container_name: opscenter-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opscenter}
      POSTGRES_USER: ${POSTGRES_USER:-opscenter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opscenter}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opscenter} -d ${POSTGRES_DB:-opscenter}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opscenter-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opscenter-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://opscenter:opscenter@db:5432/opscenter}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-False}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-notifications@opscenter.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-email-password}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/WEBHOOK/URL}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - opscenter-network

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opscenter-ui
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "${UI_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opscenter-network

volumes:
  postgres_data:

networks:
  opscenter-network:
    driver: bridge